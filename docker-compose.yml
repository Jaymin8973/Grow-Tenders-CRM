services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: mongodb+srv://officialgrowtender_db_user:nkWB79kSeuptF1tA@growtender-prod-cluster.rvzdut.mongodb.net/growtender?appName=growtender-prod-cluster
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    expose:
      - "3000"
    restart: unless-stopped

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
      - website
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - /etc/letsencrypt/live/api.grow-tender.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/api.grow-tender.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    restart: unless-stopped

volumes:
  redis_data:
  uploads_data:
