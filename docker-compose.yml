services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
    env_file:
      - ./backend/.env
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    expose:
      - "3000"
    restart: unless-stopped

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
      - website
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
